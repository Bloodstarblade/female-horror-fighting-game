<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Female Horror Fighters</title>
    <style>
        body { margin: 0; background: #000; color: #f00; font-family: 'Creepster', Arial, sans-serif; overflow: hidden; }
        canvas { display: block; margin: 0 auto; image-rendering: pixelated; border: 4px solid #300; box-shadow: 0 0 30px #f00; }
        #ui { position: absolute; top: 10px; left: 10px; font-size: 20px; text-shadow: 0 0 10px #f00; }
        h1 { text-align: center; color: #900; text-shadow: 0 0 20px #f00; }
    </style>
</head>
<body>
    <h1>FEMALE HORROR FIGHTERS</h1>
    <div id="ui">Player: Lilith | Health: <span id="health">100</span></div>
    <canvas id="game" width="800" height="400"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        // Simple horror female fighter prototype
        let player = {
            x: 150,
            y: 250,
            width: 60,
            height: 100,
            health: 100,
            speed: 5,
            facing: 1,
            attacking: false
        };

        let enemy = {
            x: 550,
            y: 250,
            width: 60,
            height: 100,
            health: 100,
            speed: 3
        };

        let keys = {};

        // Background horror elements
        function drawBackground() {
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Blood splatters
            ctx.fillStyle = '#300';
            ctx.fillRect(100, 300, 200, 20);
            ctx.fillRect(500, 280, 150, 30);
            
            // Moon
            ctx.fillStyle = '#ddd';
            ctx.beginPath();
            ctx.arc(650, 80, 40, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#111';
            ctx.beginPath();
            ctx.arc(670, 70, 30, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawFighter(fighter, color, isPlayer) {
            // Body
            ctx.fillStyle = color;
            ctx.fillRect(fighter.x, fighter.y, fighter.width, fighter.height);
            
            // Head
            ctx.fillStyle = '#fdd';
            ctx.fillRect(fighter.x + 15, fighter.y - 20, 30, 30);
            
            // Eyes (glowing red)
            ctx.fillStyle = '#f00';
            ctx.fillRect(fighter.x + 22, fighter.y - 10, 6, 8);
            ctx.fillRect(fighter.x + 38, fighter.y - 10, 6, 8);
            
            // Hair / horns for horror feel
            ctx.fillStyle = '#300';
            ctx.fillRect(fighter.x + 10, fighter.y - 35, 40, 20);
            
            if (fighter.attacking) {
                ctx.fillStyle = '#f00';
                ctx.fillRect(fighter.x + (fighter.facing > 0 ? 60 : -30), fighter.y + 30, 40, 20);
            }
        }

        function update() {
            // Player movement
            if (keys['ArrowLeft'] || keys['a']) {
                player.x -= player.speed;
                player.facing = -1;
            }
            if (keys['ArrowRight'] || keys['d']) {
                player.x += player.speed;
                player.facing = 1;
            }
            if (keys[' '] && !player.attacking) {
                player.attacking = true;
                setTimeout(() => { player.attacking = false; }, 300);
                
                // Simple attack hit
                if (Math.abs(player.x - enemy.x) < 80) {
                    enemy.health -= 15;
                }
            }

            // Keep in bounds
            player.x = Math.max(50, Math.min(canvas.width - 100, player.x));
            enemy.x = Math.max(50, Math.min(canvas.width - 100, enemy.x));

            // Basic AI
            if (enemy.x > player.x + 50) enemy.x -= enemy.speed;
            if (enemy.x < player.x - 50) enemy.x += enemy.speed;

            // Enemy attack
            if (Math.random() < 0.02 && Math.abs(enemy.x - player.x) < 70) {
                player.health -= 8;
            }

            // Win/lose conditions
            if (player.health <= 0) {
                alert('GAME OVER - The horror consumes you...');
                resetGame();
            }
            if (enemy.health <= 0) {
                alert('VICTORY! You are the ultimate Female Horror Fighter!');
                resetGame();
            }
        }

        function draw() {
            drawBackground();
            drawFighter(player, '#600', true);
            drawFighter(enemy, '#330', false);
            
            // Health bars
            ctx.fillStyle = '#0f0';
            ctx.fillRect(player.x, player.y - 40, player.health * 0.6, 8);
            ctx.fillStyle = '#0f0';
            ctx.fillRect(enemy.x, enemy.y - 40, enemy.health * 0.6, 8);
        }

        function gameLoop() {
            update();
            draw();
            document.getElementById('health').textContent = Math.max(0, Math.floor(player.health));
            requestAnimationFrame(gameLoop);
        }

        function resetGame() {
            player.health = 100;
            enemy.health = 100;
            player.x = 150;
            enemy.x = 550;
        }

        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);

        // Instructions
        console.log('%cFemale Horror Fighters\nArrow keys / WASD to move\nSpace to ATTACK', 'color:#f00; font-size:16px');

        gameLoop();
    </script>
</body>
</html>
